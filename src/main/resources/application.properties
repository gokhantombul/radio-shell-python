spring.main.banner-mode=off
spring.shell.interactive.enabled=false

# Logging - sadece uygulama logları
logging.level.root=WARN
logging.level.com.radio=WARN

# Radio Shell Config
radio.player.command=ffplay
radio.player.args=-nodisp,-hide_banner,-loglevel,quiet,-autoexit
radio.stations.file=classpath:stations.json
radio.favorites-file=${user.home}/.radio-shell/favorites.json
radio.custom-stations-file=${user.home}/.radio-shell/custom-stations.json
radio.settings-file=${user.home}/.radio-shell/settings.json
radio.recordings-dir=${user.home}/.radio-shell/recordings
radio.stats-file=${user.home}/.radio-shell/stats.json
